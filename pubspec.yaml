name: farm_manager
description: A Cross-Platform Mobile Farm Management System for Group 14B.
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # FIREBASE SUITE
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.1

  # STATE & STORAGE
  provider: ^6.1.1
  shared_preferences: ^2.2.0

  # UI & DESIGN
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # IMAGE HANDLING
  image_picker: ^1.1.2

  # HTTP (required for ImgBB image upload)
  http: ^1.2.0

  # PDF, FILE & STORAGE HANDLING
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/